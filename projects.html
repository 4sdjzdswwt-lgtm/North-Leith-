<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Projelerimiz - North Leith</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- TEMA DEĞİŞKENLERİ (KOYU MOD) --- */
        :root {
            --bg-body: #18191a;
            --bg-container: #242526;
            --border-container: rgba(255, 255, 255, 0.05);
            --border-subcard: rgba(255, 255, 255, 0.08);
            --text-main: #f5f6f7;
            --text-sub: #b0b3b8;
            --shadow-main: rgba(0, 0, 0, 0.5);
            --project-item-bg: #3a3b3c;
        }

        /* --- BEYAZ MOD --- */
        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --border-container: rgba(0, 0, 0, 0.05);
            --border-subcard: rgba(0, 0, 0, 0.05);
            --text-main: #050505;
            --text-sub: #65676b;
            --shadow-main: rgba(0, 0, 0, 0.08);
            --project-item-bg: #f0f2f5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            background: var(--bg-container);
            padding: 40px 25px;
            border-radius: 35px; 
            border: 1px solid var(--border-container); 
            box-shadow: var(--shadow-main);
            width: 100%;
            max-width: 420px;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
            text-align: center;
        }

        .controls-corner {
            position: absolute;
            top: 20px;
            right: 25px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 10;
        }

        .theme-toggle-corner, .lang-toggle-corner, .top-back-corner {
            background: transparent;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-main);
            transition: transform 0.2s;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
            text-decoration: none;
        }
        
        .top-back-corner {
            font-size: 1.1rem;
            color: #6f42c1; /* Dikkat çekmesi için mor tonlarında */
        }
        .top-back-corner:hover {
            transform: scale(1.1);
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            margin-top: 15px;
        }

        .logo { width: 32px; height: 32px; border-radius: 6px; object-fit: contain; }
        h1 { color: var(--text-main); font-size: 1.4rem; font-weight: 600; }

        /* --- PROJE LİSTESİ ALANI --- */
        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-bottom: 25px;
            text-align: left;
        }

        .project-card {
            background: var(--project-item-bg);
            padding: 18px;
            border-radius: 20px;
            border: 1px solid var(--border-subcard);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            gap: 6px;
            text-decoration: none; /* Linklerin alt çizgisini kaldırmak için */
        }

        .project-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .project-title {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .project-desc {
            font-size: 0.85rem;
            color: var(--text-sub);
            line-height: 1.4;
        }

        /* --- ALT GERİ DÖNÜŞ BUTONU --- */
        .back-btn {
            width: 100%;
            padding: 15px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.25s ease;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
            background: #6f42c1;
            color: #ffffff;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .back-btn:hover {
            background: #5a32a3;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="controls-corner">
            <a href="North.html" class="top-back-corner" title="Geri Dön">
                <i class="fa-solid fa-circle-arrow-left"></i>
            </a>
            <button class="lang-toggle-corner" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i> <span class="lang-lbl">EN</span></button>
            <button class="theme-toggle-corner" onclick="toggleTheme()">🌙</button>
        </div>

        <div class="header">
            <img src="IMG_1529.jpeg" id="siteLogo" class="logo" alt="Logo">
            <h1 id="txtPageTitle">Projelerimiz</h1>
        </div>

        <div class="projects-list">
            
            <a href="https://lemarinkonyaalti.com" target="_blank" class="project-card">
                <div class="project-title">
                    <i class="fa-solid fa-earth-americas" style="color: #007bff;"></i>
                    <span>Lemarin Konyaaltı</span>
                </div>
                <div class="project-desc">lemarinkonyaalti.com</div>
            </a>

            <a href="https://www.tuncgroup.com.tr" target="_blank" class="project-card">
                <div class="project-title">
                    <i class="fa-solid fa-earth-americas" style="color: #28a745;"></i>
                    <span>Tunç Group</span>
                </div>
                <div class="project-desc">tuncgroup.com.tr</div>
            </a>

        </div>

        <a href="North.html" class="back-btn" id="btnBack">
            <i class="fa-solid fa-arrow-left"></i> <span id="txtBackBtn">Geri Dön</span>
        </a>
    </div>

    <script>
        // --- ÇOKLU DİL DESTEĞİ ---
        const translations = {
            tr: {
                langLbl: "EN",
                txtPageTitle: "Projelerimiz",
                txtBackBtn: "Geri Dön"
            },
            en: {
                langLbl: "DE",
                txtPageTitle: "Our Projects",
                txtBackBtn: "Go Back"
            },
            de: {
                langLbl: "TR",
                txtPageTitle: "Unsere Projekte",
                txtBackBtn: "Zurück"
            }
        };

        function toggleLanguage() {
            let currentLang = localStorage.getItem('site_lang') || 'tr';
            let newLang = 'tr';
            if (currentLang === 'tr') newLang = 'en';
            else if (currentLang === 'en') newLang = 'de';
            else if (currentLang === 'de') newLang = 'tr';
            
            localStorage.setItem('site_lang', newLang);
            applyLanguage(newLang);
        }

        function applyLanguage(lang) {
            const data = translations[lang];
            document.querySelectorAll('.lang-lbl').forEach(el => el.textContent = data.langLbl);
            document.getElementById('txtPageTitle').textContent = data.txtPageTitle;
            document.getElementById('txtBackBtn').textContent = data.txtBackBtn;
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = (currentTheme === 'light') ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('site_theme', newTheme);
            updateThemeButtons(newTheme);
            updateLogo(newTheme);
        }

        function updateThemeButtons(theme) {
            document.querySelectorAll('.theme-toggle-corner').forEach(btn => {
                btn.textContent = (theme === 'light') ? '☀️' : '🌙';
            });
        }

        function updateLogo(theme) {
            const logoImg = document.getElementById('siteLogo');
            if (logoImg) {
                if (theme === 'light') {
                    logoImg.src = 'siyah_logo.PNG';
                } else {
                    logoImg.src = 'northleith_logo_beyaz.PNG';
                }
            }
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('site_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButtons(savedTheme);
            updateLogo(savedTheme);

            const savedLang = localStorage.getItem('site_lang') || 'tr';
            applyLanguage(savedLang);
        };
    </script>
</body>
</html>
