<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith - Projelerimiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #18191a; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .container { background: #111213; padding: 25px 15px; border-radius: 35px; width: 100%; max-width: 430px; border: 1px solid rgba(255,255,255,0.06); }
        
        /* ÜST BAR */
        .top-navbar { display: flex; justify-content: space-between; align-items: center; background: #1c1d1e; padding: 12px 25px; border-radius: 50px; margin-bottom: 35px; border: 1px solid rgba(255,255,255,0.06); }
        .nav-item { color: #ffffff; text-decoration: none; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; }
        
        /* ÇAPRAZ ASİMETRİK GALERİ DÜZENİ */
        .gallery-grid { display: flex; flex-direction: column; gap: 35px; }
        .gallery-row { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 15px; }
        .project-card { width: 55%; background: #1c1d1e; border-radius: 24px; padding: 10px; border: 1px solid rgba(255,255,255,0.06); text-decoration: none; }
        .browser-mockup { background: #2e3033; border-radius: 16px; overflow: hidden; }
        .browser-header { height: 20px; background: #1c1d1e; display: flex; padding: 0 8px; gap: 4px; align-items: center; }
        .circle { width: 5px; height: 5px; border-radius: 50%; background: #ff5f56; }
        .browser-body img { width: 100%; height: 110px; object-fit: cover; display: block; }
        .site-label { width: 42%; background: #ffffff; color: #000000; font-family: 'serif'; font-weight: bold; font-size: 0.85rem; padding: 8px 4px; border-radius: 50px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="top-navbar">
            <a href="North.html" class="nav-item"><i class="fa-solid fa-arrow-left"></i> <span>Geri</span></a>
            <div class="nav-item">🌙</div>
            <div class="nav-item"><i class="fa-solid fa-earth-americas" style="color:#27c93f;"></i></div>
        </div>

        <div class="gallery-grid">
            <div class="gallery-row">
                <a href="https://lemarinkonyaalti.com" target="_blank" class="project-card">
                    <div class="browser-mockup">
                        <div class="browser-header"><div class="circle"></div><div class="circle" style="background:#ffbd2e"></div><div class="circle" style="background:#27c93f"></div></div>
                        <div class="browser-body"><img src="https://images.unsplash.com/photo-1545235617-9465d2a55698?q=80&w=600&auto=format&fit=crop"></div>
                    </div>
                </a>
                <div class="site-label">[ Le Marin ]</div>
            </div>

            <div class="gallery-row">
                <div class="site-label">[ RezTowns ]</div>
                <a href="https://reztowns.com/tr" target="_blank" class="project-card">
                    <div class="browser-mockup">
                        <div class="browser-header"><div class="circle"></div><div class="circle" style="background:#ffbd2e"></div><div class="circle" style="background:#27c93f"></div></div>
                        <div class="browser-body"><img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=600&auto=format&fit=crop"></div>
                    </div>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
