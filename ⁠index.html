<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- TEMA DEĞİŞKENLERİ (KOYU MOD) --- */
        :root {
            --bg-body: #111213;
            --bg-container: #1e1f21;
            --border-container: rgba(255, 255, 255, 0.06);
            --text-main: #f5f6f7;
            --text-sub: #9ea1a7;
            --shadow-main: rgba(0, 0, 0, 0.6);
            --input-bg: #2a2b2d;
            --input-text: #f5f6f7;
            --input-border: rgba(255, 255, 255, 0.08);
            --btn-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
        }

        /* --- BEYAZ MOD --- */
        [data-theme="light"] {
            --bg-body: #f4f6f9;
            --bg-container: #ffffff;
            --border-container: rgba(0, 0, 0, 0.06);
            --text-main: #0f1115;
            --text-sub: #6c727f;
            --shadow-main: rgba(0, 0, 0, 0.06);
            --input-bg: #f0f2f5;
            --input-text: #0f1115;
            --input-border: rgba(0, 0, 0, 0.06);
            --btn-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            background: var(--bg-container); 
            padding: 40px 30px;
            border-radius: 30px; 
            border: 1px solid var(--border-container); 
            box-shadow: var(--shadow-main);
            width: 100%;
            max-width: 420px;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
            transition: all 0.3s ease;
        }

        .controls-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .theme-toggle-corner, .lang-toggle-corner {
            background: transparent;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- HERO & TANITIM ALANI STİLLERİ --- */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            text-align: center;
        }

        .logo-wrapper {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 24px;
            margin-bottom: 15px;
            border: 1px solid var(--border-container);
        }

        .logo { 
            width: 65px; 
            height: 65px; 
            object-fit: contain; 
            border-radius: 12px;
        }

        h1 { 
            color: var(--text-main); 
            font-size: 1.8rem; 
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        .hero-description {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto 25px auto;
        }

        /* Yan Yana Buton Grubu */
        .button-group-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* --- GIF ALANI --- */
        .gif-display-area {
            width: 130px;
            height: 130px;
            margin: 0 auto 20px auto;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border-container);
            background: #fff;
        }
        .gif-display-area img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* --- FORM ELEMENTLERİ --- */
        .input-group { margin-bottom: 18px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: var(--text-main); font-weight: 500; font-size: 0.85rem; }
        .input-wrapper { position: relative; }

        input {
            width: 100%;
            padding: 14px 20px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            border-radius: 14px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--input-text);
            transition: all 0.25s ease;
            padding-right: 45px;
        }
        input:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15); }

        .input-user-icon, .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: var(--text-sub);
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .remember-me-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 18px;
            text-align: left;
        }
        .remember-me-container input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; }
        .remember-me-container label { margin-bottom: 0; cursor: pointer; font-size: 0.85rem; color: var(--text-sub); }

        .login-btn, .register-btn, .accept-btn, .nav-btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            box-shadow: var(--btn-shadow);
            font-family: 'Poppins', sans-serif;
        }
        .login-btn, .nav-btn-primary { background: #007bff; color: #fff; }
        .login-btn:hover, .nav-btn-primary:hover { background: #0069d9; transform: translateY(-1px); }
        
        .register-btn, .nav-btn-secondary { background: #28a745; color: #fff; }
        .register-btn:hover, .nav-btn-secondary:hover { background: #218838; transform: translateY(-1px); }

        .back-to-landing {
            color: var(--text-sub);
            font-size: 0.85rem;
            margin-top: 18px;
            text-align: center;
            cursor: pointer;
            font-weight: 500;
        }
        .back-to-landing:hover { color: #007bff; }

        .status { text-align: center; margin-top: 12px; font-size: 13px; }

        /* --- EKRAN GİZLEME VE GÖSTERME KURALLARI --- */
        .login-container, .register-container, .reg-gif-container, .agreement-container, .video-container { display: none; }

        .video-wrapper { width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 10px; background: #000; }
        #myVideo { width: 100%; max-height: 65vh; display: block; }
        .unmute-banner-btn, .skip-btn { width: 100%; padding: 14px 20px; font-size: 14px; font-weight: 600; border-radius: 14px; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; font-family: 'Poppins', sans-serif; }
        .skip-btn { background: #28a745; color: #fff; margin-top: 15px; display: none; }
        .unmute-banner-btn { background: #ff9f43; color: #fff; margin-top: 5px; margin-bottom: 10px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 0.9; } 50% { opacity: 1; transform: scale(1.01); } 100% { opacity: 0.9; } }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>

    <div class="container" id="landingPage">

        </div>

        <div class="hero-section">

    <div class="container register-container" id="registerPage">
        <div class="controls-corner">
            <button class="lang-toggle-corner" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i> <span class="lang-lbl">EN</span></button>
            <button class="theme-toggle-corner" onclick="toggleTheme()">🌙</button>
        </div>
        
        <div class="hero-section">
            <div class="logo-wrapper">
                <img src="NorthLeith.png.PNG" class="logo" alt="Logo">
            </div>
            <div class="gif-display-area">
                <img src="shirley_dramalover_pindown.io_1781614422.gif" alt="Kayıt Durumu">
            </div>
        </div>

        <div class="input-group">
            <label id="lblNewUser">Yeni Kullanıcı Adı</label>
            <div class="input-wrapper">
                <input type="text" id="regUsername" placeholder="Bir kullanıcı adı belirle...">
                <i class="fa-solid fa-user input-user-icon"></i>
            </div>
        </div>
        <div class="input-group">
            <label id="lblNewPass">Yeni Şifre</label>
            <input type="password" id="regPassword" placeholder="Bir şifre belirle...">
        </div>
        <button class="register-btn" id="btnRegister" onclick="registerProcess()">Kayıt Ol ve Kaydet</button>
        <div id="regStatus" class="status" style="color: #ff4d4d;"></div>
        <div class="back-to-landing" onclick="showLandingPage()">➔ Geri Dön</div>

        </div>
        <p style="color:#28a745; font-weight:600;" id="txtRegSuccess">Hesabınız başarıyla oluşturuldu!</p>

    <div class="container agreement-container" id="agreementPage">

            <label for="agreeCheck" id="lblAgree" style="font-weight:600;">Okudum, kabul ediyorum.</label>

        <button class="accept-btn" id="btnAccept" onclick="startVideoShow()">Kabul Ettim</button>
        <div id="errorText" class="status" style="color:#ff4d4d; display:none;"></div>
