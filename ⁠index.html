<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith - Karşılama Paneli</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- TEMA AYARLARI (KOYU MOD) --- */
        :root {
            --bg-body: #111213;
            --bg-container: #1e1f21;
            --border-container: rgba(255, 255, 255, 0.06);
            --text-main: #f5f6f7;
            --text-sub: #9ea1a7;
            --shadow-main: rgba(0, 0, 0, 0.6);
        }

        /* --- AÇIK MOD --- */
        [data-theme="light"] {
            --bg-body: #f4f6f9;
            --bg-container: #ffffff;
            --border-container: rgba(0, 0, 0, 0.06);
            --text-main: #0f1115;
            --text-sub: #6c727f;
            --shadow-main: rgba(0, 0, 0, 0.06);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        /* --- ANA PANEL (KART) --- */
        .panel-container {
            background: var(--bg-container); 
            padding: 40px 30px;
            border-radius: 30px; 
            border: 1px solid var(--border-container); 
            box-shadow: var(--shadow-main);
            width: 100%;
            max-width: 420px;
            text-align: center;
            position: relative;
            transition: all 0.3s ease;
        }

        .controls-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .theme-toggle-corner, .lang-toggle-corner {
            background: transparent;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* Logo Çerçevesi */
        .logo-wrapper {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 24px;
            margin-bottom: 15px;
            border: 1px solid var(--border-container);
        }

        .logo { 
            width: 70px; 
            height: 70px; 
            object-fit: contain; 
            border-radius: 12px;
        }

        h1 { 
            color: var(--text-main); 
            font-size: 1.8rem; 
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
        }

        /* Kısa Özet Metni */
        .hero-description {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.6;
            max-width: 320px;
            margin: 0 auto 25px auto;
        }

        /* Yan Yana Buton Grubu */
        .button-group-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* Buton Genel Stilleri */
        .nav-btn {
            width: 100%;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.2s ease;
            font-family: 'Poppins', sans-serif;
            text-decoration: none;
        }

        /* Giriş Yap Butonu (Mavi) */
        .nav-btn-primary { 
            background: #007bff; 
            color: #fff; 
        }
        .nav-btn-primary:hover { 
            background: #0069d9; 
            transform: translateY(-1px); 
        }
        
        /* Kayıt Ol Butonu (Yeşil) */
        .nav-btn-secondary { 
            background: #28a745; 
            color: #fff; 
        }
        .nav-btn-secondary:hover { 
            background: #218838; 
            transform: translateY(-1px); 
        }
    </style>
</head>
<body>

    <div class="panel-container">
        
        <div class="controls-corner">
            <button class="lang-toggle-corner" onclick="toggleLanguage()">
                <i class="fa-solid fa-globe"></i> <span class="lang-lbl">EN</span>
            </button>
            <button class="theme-toggle-corner" onclick="toggleTheme()">🌙</button>
        </div>

        <div class="hero-section">
            <div class="logo-wrapper">
                <img src="NorthLeith.png.PNG" class="logo" alt="Logo">
            </div>
            
            <h1 id="txtSiteTitle">NorthLeith.com</h1>
            
            <div class="hero-description" id="txtHeroDesc">
                Yenilikçi dijital çözümler, modern web deneyimleri ve yaratıcı projelerin buluşma noktası.
            </div>
            
            <div class="button-group-row">
                <a href="login.html" class="nav-btn nav-btn-primary" id="btnGoLogin">Giriş Yap</a>
                <a href="register.html" class="nav-btn nav-btn-secondary" id="btnGoRegister">Kayıt Ol</a>
            </div>
        </div>

    </div>

    <script>
        // Dil Seçenekleri Çevirisi
        const translations = {
            tr: {
                langLbl: "EN",
                txtHeroDesc: "Yenilikçi dijital çözümler, modern web deneyimleri ve yaratıcı projelerin buluşma noktası.",
                btnGoLogin: "Giriş Yap",
                btnGoRegister: "Kayıt Ol"
            },
            en: {
                langLbl: "TR",
                txtHeroDesc: "The meeting point of innovative digital solutions, modern web experiences, and creative projects.",
                btnGoLogin: "Login",
                btnGoRegister: "Register"
            }
        };

        function toggleLanguage() {
            let currentLang = localStorage.getItem('site_lang') || 'tr';
            let newLang = (currentLang === 'tr') ? 'en' : 'tr';
            localStorage.setItem('site_lang', newLang);
            applyLanguage(newLang);
        }

        function applyLanguage(lang) {
            const data = translations[lang];
            document.querySelector('.lang-lbl').textContent = data.langLbl;
            document.getElementById('txtHeroDesc').textContent = data.txtHeroDesc;
            document.getElementById('btnGoLogin').textContent = data.btnGoLogin;
            document.getElementById('btnGoRegister').textContent = data.btnGoRegister;
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = (currentTheme === 'light') ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('site_theme', newTheme);
            updateThemeButton(newTheme);
        }

        function updateThemeButton(theme) {
            const btn = document.querySelector('.theme-toggle-corner');
            btn.textContent = (theme === 'light') ? '☀️' : '🌙';
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('site_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButton(savedTheme);

            const savedLang = localStorage.getItem('site_lang') || 'tr';
            applyLanguage(savedLang);
        };
    </script>
</body>
</html>
