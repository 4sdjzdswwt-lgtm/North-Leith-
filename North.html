<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith - Projelerimiz</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        :root {
            --bg-body: #18191a;
            --bg-container: #111213; /* Çizimindeki gibi koyu arka plan */
            --border-container: rgba(255, 255, 255, 0.06);
            --text-main: #f5f6f7;
            --text-sub: #b0b3b8;
            --card-bg: #1c1d1e;
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --border-container: rgba(0, 0, 0, 0.06);
            --text-main: #050505;
            --text-sub: #65676b;
            --card-bg: #f0f2f5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .container {
            background: var(--bg-container); 
            padding: 25px 15px;
            border-radius: 35px; 
            width: 100%;
            max-width: 430px;
            max-height: 95vh;
            overflow-y: auto;
            border: 1px solid var(--border-container);
        }

        .container::-webkit-scrollbar { width: 0px; }

        /* ÜST BAR (Çizimindeki gibi oval hatlar) */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1c1d1e;
            padding: 12px 25px;
            border-radius: 50px;
            margin-bottom: 35px;
            border: 1px solid var(--border-container);
        }

        .nav-item {
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .green-globe {
            color: #27c93f;
        }

        /* ÇAPRAZ ASİMETRİK GALERİ DÜZENİ (Çizimin Birebir Aynısı) */
        .gallery-grid {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Satır Yapısı */
        .gallery-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            gap: 15px;
        }

        /* Kart Yapısı */
        .project-card {
            width: 55%; /* Ekranın yarısından biraz fazlası kart */
            background: var(--card-bg);
            border-radius: 24px;
            padding: 10px;
            border: 1px solid var(--border-container);
            text-decoration: none;
            transition: transform 0.2s;
        }

        .project-card:hover {
            transform: scale(1.03);
        }

        /* Tarayıcı Görünümü */
        .browser-mockup {
            background: #2e3033;
            border-radius: 16px;
            overflow: hidden;
            position: relative;
        }

        .browser-header {
            height: 20px;
            background: #1c1d1e;
            display: flex;
            align-items: center;
            padding: 0 8px;
            gap: 4px;
        }

        .circle { width: 5px; height: 5px; border-radius: 50%; }
        .c-red { background: #ff5f56; }
        .c-yellow { background: #ffbd2e; }
        .c-green { background: #27c93f; }

        .browser-body img {
            width: 100%;
            height: 110px;
            object-fit: cover;
            display: block;
        }

        /* Çizimindeki Beyaz [ Site ismi ] Etiketi */
        .site-label {
            width: 40%; /* Kalan boşluk etiket için */
            background: #ffffff;
            color: #000000;
            font-family: 'serif';
            font-weight: bold;
            font-size: 0.85rem;
            padding: 8px 5px;
            border-radius: 50px;
            text-align: center;
            white-space: nowrap;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-navbar">
            <button class="nav-item" onclick="toggleLang()">
                <i class="fa-solid fa-globe"></i> <span>EN</span>
            </button>
            <button class="nav-item" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <div class="nav-item">
                <span>6</span> <i class="fa-solid fa-earth-americas green-globe"></i>
            </div>
        </div>

        <div class="gallery-grid">
            
            <div class="gallery-row">
                <a href="https://lemarinkonyaalti.com" target="_blank" class="project-card">
                    <div class="browser-mockup">
                        <div class="browser-header">
                            <div class="circle c-red"></div><div class="circle c-yellow"></div><div class="circle c-green"></div>
                        </div>
                        <div class="browser-body">
                            <img src="https://images.unsplash.com/photo-1545235617-9465d2a55698?q=80&w=600&auto=format&fit=crop" alt="Le Marin">
                        </div>
                    </div>
                </a>
                <div class="site-label">[ Le Marin ]</div>
            </div>

            <div class="gallery-row">
                <div class="site-label">[ RezTowns ]</div>
                <a href="https://reztowns.com/tr" target="_blank" class="project-card">
                    <div class="browser-mockup">
                        <div class="browser-header">
                            <div class="circle c-red"></div><div class="circle c-yellow"></div><div class="circle c-green"></div>
                        </div>
                        <div class="browser-body">
                            <img src="https://images.unsplash.com/photo-1560518883-ce09059eeffa?q=80&w=600&auto=format&fit=crop" alt="RezTowns">
                        </div>
                    </div>
                </a>
            </div>

        </div>
    </div>

    <script>
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('site_theme', target);
            document.getElementById('themeBtn').textContent = target === 'light' ? '☀️' : '🌙';
        }

        window.onload = function() {
            const saved = localStorage.getItem('site_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
            document.getElementById('themeBtn').textContent = saved === 'light' ? '☀️' : '🌙';
        };
    </script>
</body>
</html>
