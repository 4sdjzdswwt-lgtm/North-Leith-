<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0b071a; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(40, 40, 45, 0.45); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 35px;
            border-radius: 40px; 
            border: 1.5px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .logo { 
            width: 32px; 
            height: 32px; 
            border-radius: 6px;
            object-fit: contain;
        }

        h1 { 
            color: #fff; 
            font-size: 1.65rem; 
            font-weight: 600;
        }

        .emoji-gif {
            width: 120px; 
            height: 120px; 
            border-radius: 20px;
            margin: 10px auto 30px;
            display: block;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px 50px 15px 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            font-size: 15.5px;
            background: #000000;
            color: #fff;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.7);
        }

        .input-user-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
        }

        .remember-me-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            margin-top: -10px;
            margin-bottom: 20px;
            text-align: left;
            padding-left: 2px;
        }

        .remember-me-container input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #ff5722;
            cursor: pointer;
        }

        .remember-me-container label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            cursor: pointer;
            user-select: none;
            margin-bottom: 0;
        }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #ff5722; 
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }

        .login-btn:hover {
            background: #f4511e;
            transform: translateY(-2px);
        }

        .status { 
            text-align: center; 
            margin-top: 15px; 
            font-size: 15px; 
            color: #fff; 
        }

        .welcome-container {
            display: none;
            text-align: center;
        }
        
        .welcome-title { 
            font-size: 2.1rem; 
            margin: 15px 0; 
            color: #fff; 
        }
        
        .welcome-container p { 
            color: #fff; 
            font-size: 1.05rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .gif-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
        }

        .logout-btn {
            width: 100%;
            padding: 16px;
            background: #2ec4b6; 
            color: #000000;     
            border: none;
            border-radius: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: #20a497;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="container" id="loginPage">
        <div class="header">
            <img src="IMG_1529.jpeg" class="logo" alt="North Leith Logo">
            <h1>NorthLeith.com</h1>
        </div>
        
        <img id="mainEmoji" class="emoji-gif" src="https://cdn3.emoji.gg/emojis/6754-pentol-sit.png">

        <div class="input-group">
            <label for="username">Kullanıcı Adı</label>
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="Kullanıcı adını gir...">
                <i class="fa-solid fa-user input-user-icon"></i>
            </div>
        </div>

        <div class="input-group">
            <label for="password">Şifre</label>
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Şifreni gir...">
                <button type="button" class="toggle-password" id="toggleBtn">
                    <i class="fa-solid fa-eye-slash" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <div class="remember-me-container">
            <input type="checkbox" id="rememberMe">
            <label for="rememberMe">Beni Hatırla</label>
        </div>

        <button class="login-btn" onclick="login()">Giriş Yap</button>
        <div class="status" id="status"></div>
    </div>

    <div class="container welcome-container" id="welcomePage">
        <div class="gif-wrapper">
            <div class="tenor-gif-embed" data-postid="16899029469483761674" data-share-method="host" data-aspect-ratio="1" data-width="150px">
                <a href="https://tenor.com/view/cat-kiss-catkiss-cat-kiss-cat-kissing-gif-16899029469483761674">Cat Kiss GIF</a>
            </div>
            <script type="text/javascript" async src="https://tenor.com/embed.js"></script>
        </div>

        <h1 class="welcome-title">Hoş Geldin! 🎉</h1>
        <p>North Leith'e başarıyla giriş yaptın.</p>
        
        <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
    </div>

    <script>
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggleBtn');
        const eyeIcon = document.getElementById('eyeIcon');
        const mainEmoji = document.getElementById('mainEmoji');

        let isPasswordVisible = false;

        function updateEmoji() {
            const val = passwordInput.value.trim();
            if (val.length > 0) {
                mainEmoji.src = isPasswordVisible 
                    ? "https://emoji.discadia.com/emojis/97b759e1-1e54-4d3b-ace0-0d6dbb846e11.GIF" 
                    : "https://cdn3.emoji.gg/emojis/58873-milkbear.gif";
            } else {
                mainEmoji.src = "https://cdn3.emoji.gg/emojis/6754-pentol-sit.png";
            }
        }

        toggleBtn.addEventListener('click', () => {
            isPasswordVisible = !isPasswordVisible;
            passwordInput.type = isPasswordVisible ? 'text' : 'password';
            
            if (isPasswordVisible) {
                eyeIcon.classList.remove('fa-eye-slash');
                eyeIcon.classList.add('fa-eye');
            } else {
                eyeIcon.classList.remove('fa-eye');
                eyeIcon.classList.add('fa-eye-slash');
            }
            updateEmoji();
        });

        function login() {
            document.getElementById('status').textContent = 'Giriş yapılıyor...';
            setTimeout(() => {
                document.getElementById('loginPage').style.display = 'none';
                document.getElementById('welcomePage').style.display = 'block';
            }, 1000);
        }

        function logout() {
            document.getElementById('welcomePage').style.display = 'none';
            document.getElementById('loginPage').style.display = 'block';
            document.getElementById('status').textContent = '';
            usernameInput.value = '';
            passwordInput.value = '';
            updateEmoji();
        }

        usernameInput.addEventListener('input', updateEmoji);
        passwordInput.addEventListener('input', updateEmoji);
    </script>
</body>
</html>
