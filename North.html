<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith - Giriş</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        :root {
            --bg-body: #18191a;
            --bg-container: #111213;
            --border-container: rgba(255, 255, 255, 0.06);
            --text-main: #f5f6f7;
            --text-sub: #b0b3b8;
            --input-bg: #1c1d1e;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
        }

        .container {
            background: var(--bg-container); 
            padding: 30px 20px;
            border-radius: 35px; 
            width: 100%;
            max-width: 430px;
            border: 1px solid var(--border-container);
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        /* ÜST BAR */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1c1d1e;
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid var(--border-container);
        }

        .nav-item {
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            background: transparent;
            border: none;
        }

        .green-globe { color: #27c93f; }

        /* PROFİL ALANI */
        .profile-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            object-fit: cover;
        }

        .profile-section h2 {
            color: var(--text-main);
            font-size: 1.4rem;
        }

        .profile-section p {
            color: var(--text-sub);
            font-size: 0.9rem;
        }

        /* BUTONLAR */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 25px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }

        .btn-grey { background: #2e3033; color: #ffffff; }
        .btn-white { background: #ffffff; color: #000000; font-weight: 600; }
        .btn-purple { background: #58269e; color: #ffffff; }

        /* YORUM VE ÜYE ALANI */
        .form-section {
            background: var(--input-bg);
            padding: 20px;
            border-radius: 28px;
            border: 1px solid var(--border-container);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .form-section h3 {
            color: var(--text-main);
            font-size: 1rem;
        }

        .comment-textarea {
            width: 100%;
            height: 80px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-container);
            border-radius: 18px;
            padding: 12px;
            color: var(--text-main);
            font-family: inherit;
            resize: none;
            outline: none;
        }

        .btn-send {
            background: #27c93f;
            color: #ffffff;
            padding: 10px 18px;
            border-radius: 14px;
            border: none;
            cursor: pointer;
            align-self: flex-end;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-navbar">
            <div class="nav-item"><i class="fa-solid fa-globe"></i> <span>EN</span></div>
            <div class="nav-item">🌙</div>
            <div class="nav-item">
                <span id="visitorCount">1</span> <i class="fa-solid fa-earth-americas green-globe"></i>
            </div>
        </div>

        <div class="profile-section">
            <img src="IMG_1529.jpeg" class="profile-img" alt="North Leith">
            <h2>Hoş Geldin! 🎉</h2>
            <p>North Leith'e başarıyla giriş yaptın.</p>
        </div>

        <div class="btn-list">
            <a href="https://northleith.com" target="_blank" class="main-btn btn-grey">
                <i class="fa-solid fa-globe"></i> Web Sitemizi Ziyaret Et
            </a>
            <a href="https://instagram.com" target="_blank" class="main-btn btn-white">
                <i class="fa-brands fa-instagram"></i> Instagram'da Takip Et
            </a>
            <a href="projects.html" class="main-btn btn-purple">
                <i class="fa-solid fa-cubes"></i> Projelerimiz
            </a>
        </div>

        <div class="form-section">
            <h3>Bize Yorum Bırakın / Üye Olun</h3>
            <textarea class="comment-textarea" id="commentInput" placeholder="Görüşlerinizi veya bilgilerinizi buraya yazabilirsiniz..."></textarea>
            <button class="btn-send" onclick="sendComment()">Gönder</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            databaseURL: "https://chat-ee35e-default-rtdb.europe-west1.firebasedatabase.app"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Canlı Sayaç
        const vCountRef = database.ref('p_views');
        vCountRef.transaction(c => (c || 0) + 1);
        vCountRef.on('value', s => {
            if(s.exists()) document.getElementById('visitorCount').textContent = s.val();
        });

        // Veri Gönderme
        function sendComment() {
            const txt = document.getElementById('commentInput').value.trim();
            if(!txt) return alert("Lütfen bir şeyler yazın!");
            
            database.ref('yorumlar/').push({
                mesaj: txt,
                tarih: new Date().toISOString()
            }).then(() => {
                alert("Başarıyla iletildi!");
                document.getElementById('commentInput').value = "";
            });
        }
    </script>
</body>
</html>
