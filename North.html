<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0b071a; 
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        /* Dil Seçici Buton Grubu */
        .lang-picker {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px 10px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .lang-btn-select {
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 10px;
            transition: all 0.2s;
        }

        .lang-btn-select.active {
            color: #fff;
            background: #ff5722;
        }

        .container {
            background: rgba(40, 40, 45, 0.45); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 35px;
            border-radius: 40px; 
            border: 1.5px solid rgba(255, 255, 255, 0.6); 
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .logo { 
            width: 32px; 
            height: 32px; 
            border-radius: 6px;
            object-fit: contain;
        }

        h1 { 
            color: #fff; 
            font-size: 1.65rem; 
            font-weight: 600;
        }

        .emoji-gif {
            width: 120px; 
            height: 120px; 
            border-radius: 20px;
            margin: 10px auto 30px;
            display: block;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #fff;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        input {
            width: 100%;
            padding: 15px 50px 15px 18px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 16px;
            font-size: 15.5px;
            background: #000000;
            color: #fff;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.7);
        }

        .input-user-icon {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: rgba(255, 255, 255, 0.7);
            pointer-events: none;
        }

        .toggle-password {
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.7);
        }

        .remember-me-container {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            margin-top: -10px;
            margin-bottom: 20px;
            text-align: left;
            padding-left: 2px;
        }
