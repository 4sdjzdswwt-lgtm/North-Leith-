<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- TEMA DEĞİŞKENLERİ (VARSAYILAN: KOYU MOD) --- */
        :root {
            --bg-body: #0b071a;
            --bg-container: rgba(40, 40, 45, 0.45);
            --border-container: rgba(255, 255, 255, 0.4);
            --border-subcard: rgba(255, 255, 255, 0.3);
            --text-main: #ffffff;
            --text-sub: rgba(255, 255, 255, 0.6);
            --shadow-main: rgba(0, 0, 0, 0.4);
            --input-dark-bg: #2a2b2e;
            --input-dark-text: #ffffff;
            --input-dark-border: rgba(255, 255, 255, 0.1);
            --btn-web-bg: #2a2b2e;
            --btn-web-text: #ffffff;
            --comment-box-bg: rgba(0, 0, 0, 0.3);
            --comment-bubble-bg: rgba(255, 255, 255, 0.05);
            --comment-bubble-border: rgba(255, 255, 255, 0.1);
            --comment-text: #e0e0e0;
        }

        /* --- BEYAZ MOD (LIGHT MODE) DEĞİŞKENLERİ --- */
        [data-theme="light"] {
            --bg-body: #f4f5f7;
            --bg-container: rgba(255, 255, 255, 0.85);
            --border-container: rgba(0, 0, 0, 0.15);
            --border-subcard: rgba(0, 0, 0, 0.12);
            --text-main: #1a1a1a;
            --text-sub: rgba(0, 0, 0, 0.6);
            --shadow-main: rgba(0, 0, 0, 0.1);
            --input-dark-bg: #f0f0f2;
            --input-dark-text: #1a1a1a;
            --input-dark-border: rgba(0, 0, 0, 0.15);
            --btn-web-bg: #e4e6eb;
            --btn-web-text: #1a1a1a;
            --comment-box-bg: rgba(0, 0, 0, 0.05);
            --comment-bubble-bg: rgba(0, 0, 0, 0.03);
            --comment-bubble-border: rgba(0, 0, 0, 0.08);
            --comment-text: #2c2c2c;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        /* ANA KONTEYNER YAPISI */
        .container {
            background: var(--bg-container); 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 40px 35px;
            border-radius: 40px; 
            border: 1.5px solid var(--border-container); 
            box-shadow: 0 20px 50px var(--shadow-main);
            width: 100%;
            max-width: 400px;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
        }

        /* GENEL SAYFALAR İÇİN SAĞ ÜST TEMA BUTONU */
        .theme-toggle-corner {
            position: absolute;
            top: 20px;
            right: 25px;
            background: transparent;
            border: none;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--text-main);
            transition: transform 0.2s;
            z-index: 10;
        }
        .theme-toggle-corner:hover {
            transform: scale(1.15);
        }

        /* EKRAN WRAPPER */
        .welcome-screen-wrapper {
            display: none; 
            flex-direction: column;
            gap: 15px; 
            width: 100%;
            max-width: 400px;
        }

        /* BAĞIMSIZ ŞABLON KARTLARI */
        .sub-card {
            background: var(--bg-container);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 30px 25px;
            border-radius: 35px;
            border: 1.5px solid var(--border-subcard);
            box-shadow: 0 15px 35px var(--shadow-main);
            width: 100%;
            text-align: center;
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
        }

        /* SAYAÇ KARTI */
        .counter-card {
            background: var(--bg-container);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 12px 25px;
            border-radius: 20px;
            border: 1.5px solid var(--border-subcard);
            box-shadow: 0 10px 25px var(--shadow-main);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between; 
            gap: 8px;
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
        }

        .counter-left {
            display: flex;
            align-items: center;
        }

        .counter-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .counter-theme-btn {
            background: transparent;
            border: none;
            font-size: 1.15rem;
            cursor: pointer;
            color: var(--text-main);
            transition: transform 0.2s;
            display: flex;
            align-items: center;
        }
        .counter-theme-btn:hover {
            transform: scale(1.15);
        }

        .counter-text {
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 600;
            opacity: 0.9;
        }

        .counter-card i.fa-earth-americas {
            color: #28a745;
            font-size: 1.1rem;
        }

        .container::-webkit-scrollbar, .welcome-screen-wrapper::-webkit-scrollbar {
            width: 6px;
        }
        .container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .logo { 
            width: 32px; 
            height: 32px; 
            border-radius: 6px;
            object-fit: contain;
        }

        h1 { 
            color: var(--text-main); 
            font-size: 1.65rem; 
            font-weight: 600;
        }

        .emoji-gif {
            width: 120px; 
            height: 120px; 
            border-radius: 20px;
            margin: 10px auto 30px;
            display: block;
        }

        .input-group {
            margin-bottom: 22px;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        input, .login-btn, .register-btn, .accept-btn, .link-card-btn, .logout-btn, .comment-btn {
            border-radius: 50px !important; 
        }

        input {
            width: 100%;
            padding: 16px 22px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s ease;
            padding-right: 50px;
        }

        #username {
            background: #ffffff;
            color: #000000;
            border: 2px solid #1a1a1a;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
        }
        #username::placeholder { color: rgba(0, 0, 0, 0.5); }

        #password {
            background: var(--input-dark-bg);
            color: var(--input-dark-text);
