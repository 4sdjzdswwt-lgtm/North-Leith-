    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- TEMA DEĞİŞKENLERİ (KOYU MOD) --- */
        :root {
            --bg-body: #18191a;
            --bg-container: #242526;
            --border-container: rgba(255, 255, 255, 0.05);
            --border-subcard: rgba(255, 255, 255, 0.08);
            --text-main: #f5f6f7;
            --text-sub: #b0b3b8;
            --shadow-main: rgba(0, 0, 0, 0.5);
            --input-dark-bg: #3a3b3c;
            --input-dark-text: #f5f6f7;
            --input-dark-border: rgba(255, 255, 255, 0.1);
            --btn-web-bg: #3a3b3c;
            --btn-web-text: #f5f6f7;
            --comment-box-bg: #1c1d1e;
            --comment-bubble-bg: #3a3b3c;
            --comment-bubble-border: rgba(255, 255, 255, 0.05);
            --comment-text: #e4e6eb;
            --btn-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* --- BEYAZ MOD --- */
        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --border-container: rgba(0, 0, 0, 0.05);
            --border-subcard: rgba(0, 0, 0, 0.05);
            --text-main: #050505;
            --text-sub: #65676b;
            --shadow-main: rgba(0, 0, 0, 0.08);
            --input-dark-bg: #f0f2f5;
            --input-dark-text: #050505;
            --input-dark-border: rgba(0, 0, 0, 0.05);
            --btn-web-bg: #e4e6eb;
            --btn-web-text: #050505;
            --comment-box-bg: #f7f8fa;
            --comment-bubble-bg: #ffffff;
            --comment-bubble-border: rgba(0, 0, 0, 0.05);
            --comment-text: #050505;
            --btn-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            background: var(--bg-container); 
            padding: 40px 30px;
            border-radius: 35px; 
            border: 1px solid var(--border-container); 
            box-shadow: var(--shadow-main);
            width: 100%;
            max-width: 400px;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
            text-align: center;
        }
