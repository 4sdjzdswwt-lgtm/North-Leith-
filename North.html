<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith - Giriş</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database.compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        :root {
            --bg-body: #18191a;
            --bg-container: #111213;
            --border-container: rgba(255, 255, 255, 0.06);
            --text-main: #f5f6f7;
            --text-sub: #b0b3b8;
            --input-bg: #1c1d1e;
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --border-container: rgba(0, 0, 0, 0.06);
            --text-main: #050505;
            --text-sub: #65676b;
            --input-bg: #f0f2f5;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 15px;
            transition: background 0.3s;
        }

        .container {
            background: var(--bg-container); 
            padding: 30px 20px;
            border-radius: 35px; 
            width: 100%;
            max-width: 430px;
            border: 1px solid var(--border-container);
            display: flex;
            flex-direction: column;
            gap: 25px;
            transition: background 0.3s;
        }

        /* ÜST BAR */
        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1c1d1e;
            padding: 12px 25px;
            border-radius: 50px;
            border: 1px solid var(--border-container);
        }

        .nav-item {
            color: #ffffff;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .green-globe { color: #27c93f; }

        /* PROFİL ALANI */
        .profile-section {
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 28px;
            object-fit: cover;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        .profile-section h2 {
            color: var(--text-main);
            font-size: 1.4rem;
            font-weight: 600;
        }

        .profile-section p {
            color: var(--text-sub);
            font-size: 0.9rem;
            max-width: 85%;
            line-height: 1.4;
        }

        /* BUTONLAR */
        .btn-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .main-btn {
            width: 100%;
            padding: 16px;
            border-radius: 25px;
            font-size: 0.95rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .main-btn:hover { transform: scale(1.02); }

        .btn-grey { background: #2e3033; color: #ffffff; }
        .btn-white { background: #ffffff; color: #000000; font-weight: 600; }
        .btn-purple { background: #58269e; color: #ffffff; }

        /* YORUM FORMU ALANI */
        .comment-section {
            background: var(--input-bg);
            padding: 20px;
            border-radius: 28px;
            border: 1px solid var(--border-container);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .comment-section h3 {
            color: var(--text-main);
            font-size: 1rem;
            font-weight: 600;
        }

        .comment-textarea {
            width: 100%;
            height: 90px;
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid var(--border-container);
            border-radius: 18px;
            padding: 12px;
            color: var(--text-main);
            font-family: inherit;
            font-size: 0.9rem;
            resize: none;
            outline: none;
        }

        .btn-send {
            background: #27c93f;
            color: #ffffff;
            padding: 10px;
            border-radius: 14px;
            border: none;
            font-weight: 500;
            cursor: pointer;
            align-self: flex-end;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="top-navbar">
            <button class="nav-item" onclick="toggleLang()">
                <i class="fa-solid fa-globe"></i> <span id="langText">EN</span>
            </button>
            <button class="nav-item" onclick="toggleTheme()" id="themeBtn">🌙</button>
            <div class="nav-item">
                <span id="visitorCount">1</span> <i class="fa-solid fa-earth-americas green-globe"></i>
            </div>
        </div>

        <div class="profile-section">
            <img src="IMG_1529.jpeg" class="profile-img" alt="North Leith">
            <h2>Hoş Geldin! 🎉</h2>
            <p>North Leith'e başarıyla giriş yaptın.</p>
        </div>

        <div class="btn-list">
            <a href="https://northleith.com" target="_blank" class="main-btn btn-grey">
                <i class="fa-solid fa-globe"></i> Web Sitemizi Ziyaret Et
            </a>
            <a href="https://instagram.com" target="_blank" class="main-btn btn-white">
                <i class="fa-brands fa-instagram"></i> Instagram'da Takip Et
            </a>
            <a href="projects.html" class="main-btn btn-purple">
                <i class="fa-solid fa-cubes"></i> Projelerimiz
            </a>
        </div>

        <div class="comment-section">
            <h3>Bize Yorum Bırakın</h3>
            <textarea class="comment-textarea" id="commentInput" placeholder="Görüşlerinizi buraya yazabilirsiniz..."></textarea>
            <button class="btn-send" onclick="sendComment()">Gönder</button>
        </div>
    </div>

    <script>
        // --- FIREBASE ENTEGRASYONU ---
        const firebaseConfig = {
            databaseURL: "https://chat-ee35e-default-rtdb.europe-west1.firebasedatabase.app"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Canlı Sayaç Sistemi
        const vCountRef = database.ref('p_views');
        vCountRef.transaction(c => (c || 0) + 1);
        vCountRef.on('value', s => {
            if(s.exists()) document.getElementById('visitorCount').textContent = s.val();
        });

        // Canlı Yorum Gönderme Fonksiyonu
        function sendComment() {
            const txt = document.getElementById('commentInput').value.trim();
            if(!txt) return alert("Lütfen bir mesaj yazın!");
            
            database.ref('yorumlar/').push({
                mesaj: txt,
                tarih: new Date().toISOString()
            }).then(() => {
                alert("Yorumunuz başarıyla iletildi!");
                document.getElementById('commentInput').value = "";
            });
        }

        // --- TEMA VE DİL SİSTEMİ ---
        function toggleTheme() {
            const current = document.documentElement.getAttribute('data-theme');
            const target = current === 'light' ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('site_theme', target);
            document.getElementById('themeBtn').textContent = target === 'light' ? '☀️' : '🌙';
        }

        function toggleLang() {
            const currentLang = localStorage.getItem('site_lang') || 'tr';
            const nextLang = currentLang === 'tr' ? 'en' : 'tr';
            localStorage.setItem('site_lang', nextLang);
            document.getElementById('langText').textContent = nextLang === 'tr' ? 'EN' : 'TR';
        }

        window.onload = function() {
            const savedTheme = localStorage.getItem('site_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            document.getElementById('themeBtn').textContent = savedTheme === 'light' ? '☀️' : '🌙';

            const savedLang = localStorage.getItem('site_lang') || 'tr';
            document.getElementById('langText').textContent = savedLang === 'tr' ? 'EN' : 'TR';
        };
    </script>
</body>
</html>
