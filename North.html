<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        /* --- TEMA DEĞİŞKENLERİ (KOYU MOD) --- */
        :root {
            --bg-body: #18191a;
            --bg-container: #242526;
            --border-container: rgba(255, 255, 255, 0.05);
            --border-subcard: rgba(255, 255, 255, 0.08);
            --text-main: #f5f6f7;
            --text-sub: #b0b3b8;
            --shadow-main: rgba(0, 0, 0, 0.5);
            --input-dark-bg: #3a3b3c;
            --input-dark-text: #f5f6f7;
            --input-dark-border: rgba(255, 255, 255, 0.1);
            --btn-web-bg: #3a3b3c;
            --btn-web-text: #f5f6f7;
            --comment-box-bg: #1c1d1e;
            --comment-bubble-bg: #3a3b3c;
            --comment-bubble-border: rgba(255, 255, 255, 0.05);
            --comment-text: #e4e6eb;
            --btn-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        /* --- BEYAZ MOD --- */
        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-container: #ffffff;
            --border-container: rgba(0, 0, 0, 0.05);
            --border-subcard: rgba(0, 0, 0, 0.05);
            --text-main: #050505;
            --text-sub: #65676b;
            --shadow-main: rgba(0, 0, 0, 0.08);
            --input-dark-bg: #f0f2f5;
            --input-dark-text: #050505;
            --input-dark-border: rgba(0, 0, 0, 0.05);
            --btn-web-bg: #e4e6eb;
            --btn-web-text: #050505;
            --comment-box-bg: #f7f8fa;
            --comment-bubble-bg: #ffffff;
            --comment-bubble-border: rgba(0, 0, 0, 0.05);
            --comment-text: #050505;
            --btn-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            background: var(--bg-container); 
            padding: 40px 30px;
            border-radius: 35px; 
            border: 1px solid var(--border-container); 
            box-shadow: var(--shadow-main);
            width: 100%;
            max-width: 400px;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
            transition: background 0.3s, border 0.3s, box-shadow 0.3s;
            text-align: center;
        }

        .controls-corner {
            position: absolute;
            top: 20px;
            right: 25px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .theme-toggle-corner, .lang-toggle-corner {
            background: transparent;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-main);
            transition: transform 0.2s;
            font-weight: 600;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .welcome-screen-wrapper {
            display: none; 
            flex-direction: column;
            gap: 20px; 
            width: 100%;
            max-width: 400px;
        }

        .sub-card {
            background: var(--bg-container);
            padding: 30px 25px;
            border-radius: 30px;
            border: 1px solid var(--border-subcard);
            box-shadow: var(--shadow-main);
            width: 100%;
            text-align: center;
            transition: background 0.3s, border 0.3s;
        }

        .counter-card {
            background: var(--bg-container);
            padding: 14px 25px;
            border-radius: 50px;
            border: 1px solid var(--border-subcard);
            box-shadow: var(--shadow-main);
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between; 
            transition: background 0.3s;
        }

        .counter-left { display: flex; align-items: center; gap: 15px; }
        .counter-right { display: flex; align-items: center; gap: 8px; }

        .counter-theme-btn, .counter-lang-btn {
            background: transparent;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 600;
        }

        .counter-text {
            color: var(--text-main);
            font-size: 0.95rem;
            font-weight: 600;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .logo { width: 32px; height: 32px; border-radius: 6px; object-fit: contain; }
        h1 { color: var(--text-main); font-size: 1.5rem; font-weight: 600; }
        .emoji-gif { width: 110px; height: 110px; margin: 10px auto 25px; display: block; object-fit: contain; }

        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; color: var(--text-main); font-weight: 500; font-size: 0.9rem; }
        .input-wrapper { position: relative; }

        input {
            width: 100%;
            padding: 16px 24px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            border-radius: 50px;
            border: 1px solid var(--input-dark-border);
            background: var(--input-dark-bg);
            color: var(--input-dark-text);
            transition: all 0.3s ease;
            padding-right: 50px;
        }
        input:focus { outline: none; box-shadow: 0 0 0 2px var(--text-main); }

        .input-user-icon {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            color: var(--text-sub);
            pointer-events: none;
        }

        .toggle-password {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: var(--text-sub);
        }

        .remember-me-container {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
            text-align: left;
        }
        .remember-me-container input[type="checkbox"] { width: 16px; height: 16px; cursor: pointer; }
        .remember-me-container label { margin-bottom: 0; cursor: pointer; }

        .login-btn, .register-btn, .accept-btn, .link-card-btn, .logout-btn, .comment-btn, .projects-toggle-btn {
