<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>North Leith - Dashboard</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght400;500;600&display=swap');

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        :root {
            --bg-body: #111213;
            --bg-container: #1e1f21;
            --border-container: rgba(255, 255, 255, 0.06);
            --text-main: #f5f6f7;
            --text-sub: #9ea1a7;
            --shadow-main: rgba(0, 0, 0, 0.6);
            --subcard-bg: #2a2b2d;
            --input-bg: #1c1d1e;
        }

        [data-theme="light"] {
            --bg-body: #f4f6f9;
            --bg-container: #ffffff;
            --border-container: rgba(0, 0, 0, 0.06);
            --text-main: #0f1115;
            --text-sub: #6c727f;
            --shadow-main: rgba(0, 0, 0, 0.06);
            --subcard-bg: #f0f2f5;
            --input-bg: #f7f8fa;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-body); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: background 0.3s ease;
        }

        .container {
            background: var(--bg-container); 
            padding: 35px 25px;
            border-radius: 30px; 
            border: 1px solid var(--border-container); 
            box-shadow: var(--shadow-main);
            width: 100%;
            max-width: 420px;
            max-height: 95vh;
            overflow-y: auto;
            position: relative;
            transition: all 0.3s ease;
        }

        .controls-corner {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 10;
        }

        .theme-toggle-corner, .lang-toggle-corner, .logout-btn {
            background: transparent;
            border: none;
            font-size: 1rem;
            cursor: pointer;
            color: var(--text-main);
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .logout-btn { color: #ff4d4d; }

        /* 🌟 ANİMASYONSUZ SABİT TANITIM ALANI */
        .hero-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 25px;
            text-align: center;
            padding-top: 15px;
        }

        .logo-wrapper {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px;
            border-radius: 24px;
            margin-bottom: 15px;
            border: 1px solid var(--border-container);
        }

        .logo { 
            width: 65px; 
            height: 65px; 
            object-fit: contain; 
            border-radius: 12px;
        }

        h1 { 
            color: var(--text-main); 
            font-size: 1.6rem; 
            font-weight: 600;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }

        .hero-description {
            font-size: 0.9rem;
            color: var(--text-sub);
            line-height: 1.5;
            max-width: 320px;
            margin: 0 auto;
        }

        /* --- SOHBET / İÇERİK ALANI --- */
        .chat-card {
            background: var(--subcard-bg);
            padding: 20px;
            border-radius: 22px;
            border: 1px solid var(--border-container);
            margin-top: 15px;
        }

        .welcome-msg {
            color: var(--text-main);
            font-weight: 500;
            font-size: 1rem;
            margin-bottom: 15px;
            text-align: center;
        }

        .video-wrapper { 
            width: 100%; 
            border-radius: 16px; 
            overflow: hidden; 
            margin-bottom: 15px; 
            background: #000;
        }
        video { width: 100%; display: block; max-height: 200px; }

        .comment-box {
            background: var(--input-bg);
            border-radius: 14px;
            padding: 12px;
            min-height: 60px;
            color: var(--text-main);
            font-size: 0.9rem;
            text-align: left;
            border: 1px solid var(--border-container);
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="container" id="welcomePage">
        <div class="controls-corner">
            <button class="lang-toggle-corner" onclick="toggleLanguage()"><i class="fa-solid fa-globe"></i> <span class="lang-lbl">EN</span></button>
            <button class="theme-toggle-corner" onclick="toggleTheme()">🌙</button>
            <button class="logout-btn" onclick="logoutProcess()"><i class="fa-solid fa-right-from-bracket"></i></button>
        </div>

        <div class="hero-section">
            <div class="logo-wrapper">
                <img src="NorthLeith.png.PNG" class="logo" alt="Logo">
            </div>
            <h1 id="txtSiteTitle">NorthLeith.com</h1>
            <div class="hero-description" id="txtHeroDesc">
                Yenilikçi dijital çözümler, modern web deneyimleri ve yaratıcı projelerin buluşma noktası.
            </div>
        </div>
        
        <div class="chat-card">
            <div class="welcome-msg" id="welcomeUserTxt">Hoş Geldiniz!</div>
            
            <div class="video-wrapper">
                <video id="appVideo" controls playsinline>
                    <source src="Onay_videosu.mp4.mov" type="video/quicktime">
                    <source src="Onay_videosu.mp4.mov" type="video/mp4">
                </video>
            </div>

            <div class="comment-box" id="txtBox">
                Sistem başarıyla yüklendi. Projelerinizi buradan takip edebilirsiniz.
            </div>
        </div>
    </div>

    <script>
        // --- FIREBASE AYARI ---
        const firebaseConfig = {
            databaseURL: "https://chat-ee35e-default-rtdb.europe-west1.firebasedatabase.app/" 
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let activeUser = sessionStorage.getItem('active_session_user') || "Misafir";

        const translations = {
            tr: {
                welcome: "Hoş Geldiniz, ",
                txtHeroDesc: "Yenilikçi dijital çözümler, modern web deneyimleri ve yaratıcı projelerin buluşma noktası."
            },
            en: {
                welcome: "Welcome, ",
                txtHeroDesc: "The meeting point of innovative digital solutions, modern web experiences, and creative projects."
            },
            de: {
                welcome: "Willkommen, ",
                txtHeroDesc: "Der Treffpunkt für innovative digitale Lösungen, moderne Web-Erlebnisse und kreative Projekte."
            }
        };

        window.onload = function() {
            // Oturum kontrolü
            if (!sessionStorage.getItem('active_session_user')) {
                window.location.href = "index.html";
                return;
            }

            const savedTheme = localStorage.getItem('site_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            
            const savedLang = localStorage.getItem('site_lang') || 'tr';
            applyLanguage(savedLang);
        };

        function applyLanguage(lang) {
            document.getElementById('welcomeUserTxt').textContent = translations[lang].welcome + activeUser.toUpperCase();
            document.getElementById('txtHeroDesc').textContent = translations[lang].txtHeroDesc;
        }

        function toggleTheme() {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            let newTheme = (currentTheme === 'light') ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('site_theme', newTheme);
        }

        function logoutProcess() {
            sessionStorage.removeItem('active_session_user');
            window.location.href = "index.html";
        }
    </script>
</body>
</html>
